pipeline:
  watch_folder: "data/"
  processed_folder: "processed/"
  quarantine_folder: "quarantine/"
  log_folder: "logs/"
  poll_interval: 6
  chunk_size: 4000

validation:
  required_fields:
    - sensor_id
    - timestamp
  numeric_fields:
    - co
    - humidity
    - lpg
    - smoke
    - temp
  boolean_fields:
    - light
    - motion
  temperature_min: -50
  temperature_max: 50
  humidity_min: 0
  humidity_max: 100